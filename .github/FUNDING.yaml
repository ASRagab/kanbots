# KanBots OSS donation channels.
# Source of truth: brain/00-product/oss-relationship.md
# Per Directive 2 (brain/_resume/DIRECTIVES.md), the OSS desktop is sustained
# by pay-what-you-can donations. Handles marked <TBD-...> are placeholders to
# be filled in by the maintainer pre-launch (GitHub Sponsors account,
# Open Collective slug, and Polar org must be created as admin actions first).

# GitHub Sponsors — lowest friction for GitHub users; 0% platform fee (year 1).
github: [<TBD-sponsors-handle>]

# Open Collective — public ledger, best for institutional donors.
open_collective: <TBD-collective-slug>

# Polar — tiered + one-time, no GitHub account required.
custom:
  - https://polar.sh/<TBD-polar-org>
