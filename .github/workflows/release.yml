name: Release desktop

# Triggers a multi-OS desktop build and uploads artifacts to a GitHub
# Release. Builds run in parallel on three OS runners; once all succeed,
# a single publish job collects every artifact and creates one draft
# release. The draft is left unpublished so a human can review the
# artifact list, fill in the changelog, and click Publish.
#
# Trigger:
#   * Push a tag matching `v*` (e.g. `v0.1.0`).
#   * Or run manually from the Actions tab via workflow_dispatch.
#
# What ships per platform:
#   linux   → kanbots-<v>-linux-x64.AppImage, kanbots-<v>-linux-x64.tar.xz
#   macos   → kanbots-<v>-mac-arm64.dmg/zip, kanbots-<v>-mac-x64.dmg/zip
#   windows → kanbots-<v>-win-x64.exe (nsis installer)
#
# Builds are unsigned for now. macOS users will need to right-click → Open
# the first time; Windows users will see SmartScreen and click "More info →
# Run anyway". See docs/releasing.md.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v, e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF_NAME}"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        # Version is taken from the root package.json `packageManager` field.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump desktop package version (no commit)
        shell: bash
        run: |
          cd packages/desktop
          npm version --no-git-tag-version --allow-same-version "${{ steps.version.outputs.version }}"

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter @kanbots/desktop run release:linux

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        env:
          # Skip notarization (unsigned builds).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm --filter @kanbots/desktop run release:mac

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: pnpm --filter @kanbots/desktop run release:win

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.tar.xz
            packages/desktop/release/*.dmg
            packages/desktop/release/*.zip
            packages/desktop/release/*.exe
            packages/desktop/release/*.blockmap
            packages/desktop/release/latest*.yml
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            tag="${GITHUB_REF_NAME}"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download every platform's build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List collected artifacts
        run: ls -la artifacts/

      - name: Create or update draft release
        # Publishes to this (public) source repo using the built-in
        # GITHUB_TOKEN. `permissions: contents: write` is set at the top.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: false
          files: |
            artifacts/*.AppImage
            artifacts/*.tar.xz
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.exe
            artifacts/*.blockmap
            artifacts/latest*.yml
